<body>
  <div class="panel">
    <h3>PostGIS Tiger Geocoder — Houston</h3>
    <div><b>Query:</b> 901 Bagby St, Houston, TX 77002</div>
    <div><b>Matched:</b> 901 Bagby St, Houston, TX 77002</div>

  <div id="map"></div>
  <script>
    var lat = 29.760753, lon = -95.369416;
    var map = L.map('map').setView([lat, lon], 17);

      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.marker([lat, lon]).addTo(map)
      .bindPopup('<b>901 Bagby St</b><br>Houston, TX 77002<br>rating 0 (exact)<br>' + lat + ', ' + lon)
      .openPopup();
    L.circle([lat, lon], { radius: 25, color: '#0a7d27' }).addTo(map);

</body>
