<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geocode Result — 1100 Congress Ave, Austin, TX</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, sans-serif; }
    #map { height: 100%; width: 100%; }
    .panel {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,0.95); padding: 12px 16px; border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.3); max-width: 320px; font-size: 13px;
    }
    .panel h3 { margin: 0 0 6px; font-size: 14px; }
    .panel code { background:#f0f0f0; padding:1px 4px; border-radius:3px; }
    .rating { color: #0a7d27; font-weight: 600; }
  </style>
</head>
<body>
  <div class="panel">
    <h3>PostGIS Tiger Geocoder</h3>
    <div><b>Query:</b> 1100 Congress Ave, Austin, TX 78701</div>
    <div><b>Matched:</b> 1100 Congress Ave, Austin, TX 78701</div>
    <div><b>Rating:</b> <span class="rating">0 (exact match)</span></div>
    <div><b>Coords:</b> <code>30.276398, -97.739810</code> (SRID 4269)</div>
  </div>
  <div id="map"></div>
  <script>
    var lat = 30.276398, lon = -97.739810;
    var map = L.map('map').setView([lat, lon], 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.marker([lat, lon]).addTo(map)
      .bindPopup('<b>1100 Congress Ave</b><br>Austin, TX 78701<br>rating 0 (exact)<br>' + lat + ', ' + lon)
      .openPopup();
    L.circle([lat, lon], { radius: 25, color: '#0a7d27' }).addTo(map);
  </script>
</body>
</html>
